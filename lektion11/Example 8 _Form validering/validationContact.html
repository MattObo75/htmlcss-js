<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
     <div class="container mt-5">
      <div class="row">
        <!--Row Start-->

        <div class="offset-lg-3 offset-md-1 col-lg-6 col-md-10">
          <form id="myForm" novalidate>
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" required placeholder="Enter Full Name" />
              <div class="invalid-feedback">Please enter your name.</div>
            </div>            

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required placeholder="Enter Email Address" />
              <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>            

            <div class="mb-3">
              <label for="phone" class="form-label">Phone Number</label>
              <input type="text" class="form-control" id="phone" required pattern="[0-9]{10}" placeholder="Enter Phone Number" />
              <div class="invalid-feedback">Please enter a valid 10-digit phone number.</div>
            </div>     
            
            <div class="mb-3">
              <label for="bio" class="form-label">Short Bio (max 140 characters):</label>              
              <textarea class="form-control" id="bio" rows="5" cols="30" required placeholder="Enter text"></textarea>
              <span id="bio-count" class="hide">140</span>            
              <div class="invalid-feedback">Please make sure your bio does not exceed 140 characters!</div>
            </div>
           
            <div class="mb-3">
              <label for="attachImage" class="form-label">Attach a picture (not required):</label>    
              <input type="file" class="form-control" id="attachImage" aria-label="image file" accept="image/*">
            </div>     

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="agree" required />
              <label class="form-check-label" for="agree">I agree to the terms and conditions</label>
              <div class="invalid-feedback">You must agree to the terms and conditions.</div>
            </div>
            <div class="mb-3 d-flex justify-content-end">
              <button type="submit" class="btn btn-primary me-2">Register Now</button>
              <button type="reset" class="btn btn-danger">Clear Details</button>
            </div>
          </form>
        </div>

        <!--Row End-->
      </div>
    </div>
    <script src="js/jquery-1.9.1.js"></script>
    <script src="js/jquery-ui-1.10.3.custom.js"></script>
    <script src="js/sub-validation-contact.js"></script>
    <script src="js/bio.js"></script>
</body>
</html>
